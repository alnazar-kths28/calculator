<DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body>
    <div>
        <input type="text" id="display" disabled>
        <button class="digits" id="btn1">1</button>
        <button class="digits" id="btn2">2</button>
        <button class="digits" id="btn3">3</button>
        <button class="operations" id="btnPlus">+</button>
        <button class="digits" id="btn4">4</button>
        <button class="digits" id="btn5">5</button>   
        <button class="digits" id="btn6">6</button>
        <button class="operations" id="btnMinus">-</button>
        <button class="digits" id="btn7">7</button>
        <button class="digits" id="btn8">8</button>
        <button class="digits" id="btn9">9</button>
        <button class="operations" id="btnMultiply">*</button>
        <button class="digits" id="btn0">0</button>
        <button class="operations" id="btnDivide">/</button>
        <button class="operations" id="btnEqual">=</button> 
        <button class="operations" id="btnClear">C</button>
    </div>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</body>
</html>
